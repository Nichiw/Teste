# ── Banco de Credenciais ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: credentials-db
  labels:
    app: credentials-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: credentials-db
  template:
    metadata:
      labels:
        app: credentials-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: medmatch_credentials
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: root-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: credentials-db-pvc
        - name: init
          configMap:
            name: credentials-db-init
---
apiVersion: v1
kind: Service
metadata:
  name: credentials-db
spec:
  selector:
    app: credentials-db
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: credentials-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
