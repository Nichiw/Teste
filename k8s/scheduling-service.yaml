apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduling-service
  labels:
    app: scheduling-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduling-service
  template:
    metadata:
      labels:
        app: scheduling-service
    spec:
      containers:
        - name: scheduling-service
          image: scheduling-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: scheduling-db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_NAME
              value: medmatch_scheduling
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8000
            - name: DOCTORS_SERVICE_URL
              value: http://doctors-service:8000
---
apiVersion: v1
kind: Service
metadata:
  name: scheduling-service
spec:
  selector:
    app: scheduling-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP