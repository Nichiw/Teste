apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctors-service
  labels:
    app: doctors-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctors-service
  template:
    metadata:
      labels:
        app: doctors-service
    spec:
      containers:
        - name: doctors-service
          image: doctors-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: doctors-db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_NAME
              value: medmatch_doctors
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
---
apiVersion: v1
kind: Service
metadata:
  name: doctors-service
spec:
  selector:
    app: doctors-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
